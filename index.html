<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio INSANO</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* PLAYER */
.player {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  border-radius: 16px;
  width: 551px;
  height: 276px;
  overflow: hidden;
  color: white;

  border: 2px solid rgba(0,255,204,0.4);
  box-shadow:
    0 0 10px rgba(0,255,204,0.3),
    0 0 20px rgba(255,0,255,0.2);
}

/* VIDEO */
.player video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* INFO */
.info-container {
  position: relative;
  width: 280px;
  height: 140px;
  display: flex;
  align-items: center;
  padding: 15px;
  z-index: 2;
}

.info-background {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  background: linear-gradient(45deg,#00ffcc,#ff00ff);
  opacity: 0.15;
}

.info {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}

.radio-name { color:#00ffcc; font-weight:bold; }
.station { color:#aaa; }

/* ARTISTA */
.artist {
  color: #fff;
  width: 100%;
  overflow: hidden;
}

.artist span {
  display: inline-block;
  white-space: nowrap;
}

/* MÚSICA */
#current-music {
  width: 100%;
  overflow: hidden;
}

#current-music span {
  display: inline-block;
  white-space: nowrap;
}

/* MARQUEE */
.marquee {
  animation: marquee 10s linear infinite;
}

@keyframes marquee {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

#volume { width: 100%; }

/* CONTADOR */
.ouvintes {
  font-size: 14px;
  color: #ccc;
  margin-top: 4px;
}

/* DIREITA */
.right {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* CAPA */
.cover {
  position: relative;
  width: 206px;
  height: 164px;
  border-radius: 12px;
  overflow: hidden;
  background: #1a1a1a;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.3s;
}

/* NOTAS */
.notes {
  position: absolute;
  bottom: 10px;
  right: 10px;
}

.note {
  position: absolute;
  font-size: 18px;
  color: #00ffcc;
  animation: floatNote 3s linear;
}

@keyframes floatNote {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-120px); opacity: 0; }
}

/* BOTÃO */
#playBtn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg,#00ffcc,#ff00ff);
  font-size: 20px;
  cursor: pointer;
}

.player.playing #playBtn {
  animation: pulse 1s infinite alternate;
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.15); }
}
</style>
</head>

<body>

<div class="player" id="player">

<video autoplay muted loop playsinline>
  <source src="https://i.imgur.com/z23V8dZ.mp4" type="video/mp4">
</video>

<div class="info-container">
  <div class="info-background"></div>
  <div class="info">
    <div class="radio-name">RÁDIO INSANO</div>
    <div class="station">Sabor Energético</div>

    <div class="artist" id="artist"><span>🎤 Carregando...</span></div>
    <div id="current-music"><span>Carregando...</span></div>

    <div class="ouvintes" id="ouvintes">👥 0 ouvindo</div>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<div class="right">
  <div class="cover">
    <img id="cover" src="https://via.placeholder.com/206x164">
    <div class="notes" id="notes"></div>
  </div>

  <button id="playBtn">▶️</button>
</div>

<audio id="audio" autoplay muted></audio>

</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const player = document.getElementById("player");

/* STREAMS */
const streams = [
  "http://stm.igng.com.br:7018/stream",
  "http://stm.igng.com.br:7018/;",
  "https://s01.svrdedicado.org:7956/stream"
];

let currentStream = 0;

async function playStream(){
  try{
    audio.src = streams[currentStream];
    await audio.play();
  }catch{
    trocarStream();
  }
}

function trocarStream(){
  currentStream++;
  if(currentStream >= streams.length) currentStream = 0;
  playStream();
}

playBtn.onclick = async ()=>{
  if(audio.paused){
    await playStream();
    playBtn.textContent="⏸️";
    player.classList.add("playing");
  }else{
    audio.pause();
    playBtn.textContent="▶️";
    player.classList.remove("playing");
  }
};

audio.onerror = trocarStream;

/* AUTOPLAY */
window.addEventListener("load", async () => {
  try {
    audio.muted = true;
    await playStream();

    setTimeout(() => {
      audio.muted = false;
    }, 2000);

    playBtn.textContent="⏸️";
    player.classList.add("playing");

  } catch {}
});

/* CLIQUE ATIVA SOM */
document.addEventListener("click", () => {
  audio.muted = false;
}, { once: true });

/* VOLUME */
volume.oninput = e => audio.volume = e.target.value;

/* NOTAS */
const notes = document.getElementById("notes");

function criarNota(){
  if(notes.children.length > 10) return;
  const n=document.createElement("div");
  n.className="note";
  n.textContent=["🎵","🎶","♪"][Math.floor(Math.random()*3)];
  n.style.left=Math.random()*40+"px";
  notes.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

setInterval(()=>{ if(!audio.paused) criarNota(); },500);

/* APPLE MUSIC */
async function buscarCapa(artista,musica){
  try{
    const termo=encodeURIComponent(`${artista} ${musica}`);
    const res=await fetch(`https://itunes.apple.com/search?term=${termo}&limit=1`);
    const data=await res.json();
    if(data.results.length){
      return data.results[0].artworkUrl100.replace("100x100","600x600");
    }
  }catch{}
  return null;
}

function atualizarCapa(url,artista){
  const img=document.getElementById("cover");
  const fallback=`https://ui-avatars.com/api/?name=${encodeURIComponent(artista)}`;
  const nova=new Image();

  nova.onload=()=>{
    img.style.opacity=0;
    setTimeout(()=>{
      img.src=url;
      img.style.opacity=1;
    },200);
  };
  nova.onerror=()=>img.src=fallback;
  nova.src=url||fallback;
}

/* TEXTO */
function atualizarTexto(texto){
  const el=document.getElementById("current-music");
  el.innerHTML=`<span>${texto}</span>`;
  const span=el.querySelector("span");
  if(span.scrollWidth>el.clientWidth){
    span.classList.add("marquee");
  }
}

/* ARTISTA */
function atualizarArtista(nome){
  const el = document.getElementById("artist");
  el.innerHTML = `<span>🎤 ${nome}</span>`;
  const span = el.querySelector("span");

  if(span.scrollWidth > el.clientWidth){
    span.classList.add("marquee");
  }
}

/* API */
async function atualizar(){
  try{
    const res=await fetch("https://vox.svrdedicado.org/api/g1.BGHPCaFIIwKZX_z9dZSiZKYCoM41zevN6iEQD1qI99s");
    const text=await res.text();
    const xml=new DOMParser().parseFromString(text,"text/xml");

    let musicaRaw=xml.querySelector("musica_atual")?.textContent||"Ao vivo";
    let ouvintes=xml.querySelector("ouvintes")?.textContent||"0";

    let artista="Desconhecido";
    let musica=musicaRaw;

    if(musicaRaw.includes("-")){
      let partes=musicaRaw.split("-");
      artista=partes[0].trim();
      musica=partes.slice(1).join("-").trim();
    }

    atualizarArtista(artista);
    atualizarTexto(musica);

    document.getElementById("ouvintes").textContent=`👥 ${ouvintes} ouvindo`;

    let capa=await buscarCapa(artista,musica);
    atualizarCapa(capa,artista);

  }catch{
    atualizarTexto("Erro na conexão");
  }
}

setInterval(atualizar,10000);
atualizar();

/* PROTEÇÃO */
document.addEventListener("contextmenu",e=>e.preventDefault());
</script>

</body>
</html>
