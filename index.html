<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM RADIO PLAYER</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --chrome: linear-gradient(145deg, #e6e6e6, #ffffff, #b3b3b3);
            --dark-glass: rgba(10, 10, 15, 0.85);
            --panel-border: rgba(255, 0, 122, 0.5);
        }

        body, html { margin: 0; padding: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* Container Principal 637x363 */
        .radio-wrapper {
            position: relative;
            width: 637px;
            height: 363px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 2px solid var(--panel-border);
            box-shadow: 0 0 30px rgba(255, 0, 122, 0.2), inset 0 0 50px rgba(0,0,0,1);
            font-family: 'Rajdhani', sans-serif;
        }

        /* Background Video */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.6) contrast(1.2);
        }

        .overlay-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 50%),
                        radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        /* HUD - Topo */
        .hud-top {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            z-index: 10;
        }

        .clock-box {
            background: var(--dark-glass);
            padding: 10px 20px;
            border-left: 4px solid var(--neon-pink);
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%);
        }

        .clock-box h2 { 
            margin: 0; color: #fff; font-family: 'Orbitron'; font-size: 24px; 
            text-shadow: 0 0 10px var(--neon-pink);
        }

        /* Área Central - Info da Música */
        .music-info-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 80%;
        }

        #sonic_art img {
            width: 120px !important; height: 120px !important;
            border-radius: 50%;
            border: 3px solid var(--neon-pink);
            box-shadow: 0 0 25px var(--neon-pink);
            margin-bottom: 15px;
            animation: rotateCapa 10s linear infinite;
        }

        @keyframes rotateCapa { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

        #sonic_title {
            color: #fff; font-size: 22px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 5px; text-shadow: 0 2px 10px rgba(0,0,0,1);
        }

        /* Controles Inferiores */
        .hud-bottom {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 100px;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid var(--panel-border);
            display: flex; align-items: center;
            padding: 0 30px; gap: 20px;
            z-index: 10;
        }

        .btn-play-main {
            width: 70px; height: 70px;
            background: var(--chrome);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .btn-play-main:hover { transform: scale(1.1); filter: brightness(1.2); }
        .btn-play-main i { color: #111; font-size: 28px; }

        .meta-data { flex-grow: 1; color: #fff; }
        .meta-data .label { color: var(--neon-pink); font-size: 12px; font-weight: 700; }

        /* Equalizer Moderno */
        .eq-container { display: flex; gap: 3px; height: 30px; align-items: flex-end; }
        .bar { width: 4px; background: var(--neon-blue); height: 5px; transition: 0.2s; }
        .active .bar { animation: barAnim 0.5s infinite alternate; }
        @keyframes barAnim { from {height: 5px;} to {height: 30px;} }

        .vol-slider-wrap { display: flex; align-items: center; gap: 10px; color: var(--neon-blue); }
        input[type=range] { -webkit-appearance: none; width: 80px; height: 4px; background: #333; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--neon-blue); cursor: pointer; border-radius: 50%; }

    </style>
</head>
<body>

    <div class="radio-wrapper">
        <video class="bg-layer" autoplay loop muted playsinline>
            <source src="https://i.imgur.com/Z78pSNa.mp4" type="video/mp4">
        </video>
        <div class="overlay-grid"></div>

        <div class="hud-top">
            <div class="clock-box">
                <span id="date-text" style="color: var(--neon-blue); font-size: 12px;">---</span>
                <h2 id="time-text">00:00</h2>
            </div>
            <div style="background: var(--dark-glass); padding: 10px; border-radius: 5px; color: var(--neon-pink);">
                <i class="fas fa-signal"></i> <span id="sonic_listeners">0</span> ONLINE
            </div>
        </div>

        <div class="music-info-center">
            <div id="sonic_art"></div>
            <div id="sonic_title">Conectando ao Stream...</div>
            <div style="color: var(--neon-blue); font-weight: 600;">DJ: <span id="sonic_dj">---</span></div>
        </div>

        <div class="hud-bottom">
            <button class="btn-play-main" id="play-trigger">
                <i class="fas fa-play" id="play-icon"></i>
            </button>

            <div class="meta-data">
                <div class="label">SPECTRUM ANALYZER</div>
                <div class="eq-container" id="eq">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
            </div>

            <div class="vol-slider-wrap">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="vol-control" min="0" max="1" step="0.1" value="0.8">
            </div>
        </div>

        <audio id="radio-player" src="http://stm.igng.com.br:7018/stream" crossorigin="anonymous"></audio>
    </div>

    <script id="sonic_js" data-port="8004" src="https://fire.doscast.com/cp/widgets.js?r=12"></script>

    <script>
        const audio = document.getElementById('radio-player');
        const playBtn = document.getElementById('play-trigger');
        const playIcon = document.getElementById('play-icon');
        const eq = document.getElementById('eq');
        const vol = document.getElementById('vol-control');

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.className = 'fas fa-pause';
                eq.classList.add('active');
            } else {
                audio.pause();
                playIcon.className = 'fas fa-play';
                eq.classList.remove('active');
            }
        });

        vol.addEventListener('input', (e) => { audio.volume = e.target.value; });

        function updateHUD() {
            const now = new Date();
            document.getElementById('time-text').textContent = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-text').textContent = now.toLocaleDateString('pt-BR', {weekday: 'short', day: '2-digit', month: '2-digit'}).toUpperCase();
        }
        setInterval(updateHUD, 1000);
        updateHUD();
    </script>
</body>
</html>
