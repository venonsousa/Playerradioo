<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Radio Luna + Apple Music API</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --silver: #C0C0C0; }
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .player-card {
            background: rgba(40, 40, 40, 0.9);
            border: 1px solid var(--silver);
            border-radius: 15px;
            width: 350px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #album-art {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            object-fit: cover;
            border: 2px solid var(--silver);
        }

        .track-info { margin-bottom: 20px; }
        .track-name { font-weight: bold; font-size: 18px; display: block; }
        .artist-name { color: var(--silver); font-size: 14px; }

        .apple-music-list {
            text-align: left;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
        }
        
        .song-item { padding: 5px 0; border-bottom: 1px solid #333; }
        
        /* Custom Scrollbar */
        .apple-music-list::-webkit-scrollbar { width: 4px; }
        .apple-music-list::-webkit-scrollbar-thumb { background: var(--silver); }
    </style>
</head>
<body>

<div class="player-card">
    <img id="album-art" src="https://via.placeholder.com/200" alt="Capa do Álbum">
    
    <div class="track-info">
        <span class="track-name" id="current-title">Sintonizando...</span>
        <span class="artist-name" id="current-artist">Rádio Luna</span>
    </div>

    <div class="apple-music-list" id="tracklist">
        <div style="color:#666">Buscando faixas no Apple Music...</div>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO ---
    // Você precisa gerar seu próprio Developer Token no Apple Developer Portal
    const APPLE_TOKEN = "SEU_JWT_TOKEN_AQUI"; 
    const RADIO_API = "http://igng.com.br/api/VG5wQmVFOUJQVDA9KzM=";

    async function updateFromAppleMusic(term) {
        try {
            const response = await fetch(`https://api.music.apple.com/v1/catalog/br/search?term=${encodeURIComponent(term)}&types=albums,songs&limit=1`, {
                headers: { 'Authorization': `Bearer ${APPLE_TOKEN}` }
            });
            const data = await response.json();
            
            if (data.results.songs && data.results.songs.data.length > 0) {
                const song = data.results.songs.data[0];
                const artworkUrl = song.attributes.artwork.url.replace('{w}', '400').replace('{h}', '400');
                
                // Atualiza a capa e o título
                $('#album-art').attr('src', artworkUrl);
                
                // Busca as outras músicas do mesmo álbum
                fetchAlbumTracks(song.relationships.albums.data[0].id);
            }
        } catch (error) {
            console.error("Erro Apple Music:", error);
        }
    }

    async function fetchAlbumTracks(albumId) {
        const response = await fetch(`https://api.music.apple.com/v1/catalog/br/albums/${albumId}/tracks`, {
            headers: { 'Authorization': `Bearer ${APPLE_TOKEN}` }
        });
        const data = await response.json();
        
        let html = "<strong>Músicas do Álbum:</strong><br>";
        data.data.forEach((track, index) => {
            html += `<div class="song-item">${index + 1}. ${track.attributes.name}</div>`;
        });
        $('#tracklist').html(html);
    }

    // Função que integra com sua rádio atual
    function checkRadio() {
        $.getJSON(RADIO_API, function(data) {
            if(data.now_playing) {
                const artist = data.now_playing.song.artist;
                const title = data.now_playing.song.title;
                
                if($('#current-title').text() !== title) {
                    $('#current-title').text(title);
                    $('#current-artist').text(artist);
                    
                    // Busca na Apple Music usando "Artista - Música"
                    updateFromAppleMusic(`${artist} ${title}`);
                }
            }
        });
    }

    // Inicia e atualiza a cada 30 segundos
    checkRadio();
    setInterval(checkRadio, 30000);

</script>
</body>
</html>
