<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio INSANO</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* PLAYER FIXO */
.player {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 15px;
  border-radius: 16px;
  color: white;
  width: 551px;
  height: 276px;
  box-sizing: border-box;
  overflow: hidden;
}

/* VÍDEO DE FUNDO */
.player video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  border-radius: 16px;
  pointer-events: none;
}

/* NEON INTELIGENTE */
.player::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 16px;
  background: linear-gradient(45deg,#00ffcc,#ff00ff,#00ffcc);
  background-size: 300%;
  z-index: -1;
  animation: none;
}
.player.playing::before { animation: neon 6s linear infinite; }
@keyframes neon { 100% { background-position: 300% } }

/* LADO ESQUERDO - INFORMAÇÕES */
.info-container {
  position: relative;
  width: 291px;
  height: 121px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 53px;
  box-sizing: border-box;
  z-index: 2;
}
.info-background {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  border-radius: 12px;
  background: linear-gradient(45deg,#00ffcc,#ff00ff);
  opacity: 0.15;
  z-index: 0;
}
.info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  z-index: 2;
}

.radio-name { font-size: 16px; color: #00ffcc; font-weight: bold; }
.station { font-size: 14px; color: #aaa; }
.artist { font-size: 14px; color: #fff; }
#current-music { font-size: 13px; color: #00ffcc; margin-top: 4px; }
#volume { width: 120px; margin-top: 4px; }

/* LADO DIREITO - CAPA E CONTROLES */
.right {
  display: flex;
  flex-direction: column;
  align-items: flex-end; 
  gap: 8px;
  z-index: 2;
}
.cover {
  width: 206px;
  height: 164px;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid transparent;
  background: linear-gradient(#1a1a1a, #1a1a1a) padding-box,
              linear-gradient(45deg,#00ffcc,#ff00ff) border-box;
}
.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 10px;
  transition: opacity 0.3s ease;
}

/* BOTÃO PLAY/PAUSE PEQUENO */
#playBtn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #00ffcc;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: #00ffcc;
  font-size: 18px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 2;
}
#playBtn:hover {
  transform: scale(1.2);
  background: linear-gradient(135deg, #00ffcc, #ff00ff);
  color: #0f0f0f;
}

/* BOTÕES DE REDES SOCIAIS */
.socials {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}
.social-btn {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 36px;
  height: 36px;
  background: #0f0f0f;
  border: 2px solid #00ffcc;
  border-radius: 50%;
  text-decoration: none;
  color: #00ffcc;
  font-size: 18px;
  transition: all 0.3s ease;
}
.social-btn:hover {
  background: #00ffcc;
  color: #0f0f0f;
  transform: scale(1.1);
}
</style>
</head>
<body>
<div class="player" id="player">

  <!-- VÍDEO DE FUNDO -->
  <video autoplay muted loop>
    <source src="https://i.imgur.com/z23V8dZ.mp4" type="video/mp4">
  </video>

  <!-- LADO ESQUERDO - INFORMAÇÕES -->
  <div class="info-container">
    <div class="info-background"></div>
    <div class="info">
      <div class="radio-name">RÁDIO INSANO</div>
      <div class="station">Sabor Energetico</div>
      <div class="artist" id="artist">🎤 LadyGagaVEVO</div>
      <div id="current-music">Carregando música...</div>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
    </div>
  </div>

  <!-- LADO DIREITO - CAPA, CONTROLES E REDES SOCIAIS -->
  <div class="right">
    <div class="cover">
      <img id="cover" src="https://via.placeholder.com/206x164?text=Rádio">
    </div>
    <button id="playBtn" class="paused"><span class="icon">▶️</span></button>
    <div class="socials">
      <a href="https://www.facebook.com/" target="_blank" class="social-btn">📘</a>
      <a href="https://www.instagram.com/" target="_blank" class="social-btn">📸</a>
      <a href="https://twitter.com/" target="_blank" class="social-btn">🐦</a>
    </div>
  </div>

  <audio id="audio" preload="none">
    <source src="https://s01.svrdedicado.org:7956/stream" type="audio/mpeg">
  </audio>
</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const volume = document.getElementById("volume");
const player = document.getElementById("player");

/* PLAY/PAUSE */
playBtn.onclick = async () => {
  try {
    if (audio.paused) {
      await audio.play();
      playBtn.classList.add("playing");
      playBtn.classList.remove("paused");
      playBtn.querySelector(".icon").textContent = "⏸️";
      player.classList.add("playing");
    } else {
      audio.pause();
      playBtn.classList.add("paused");
      playBtn.classList.remove("playing");
      playBtn.querySelector(".icon").textContent = "▶️";
      player.classList.remove("playing");
    }
  } catch (e) { console.error(e); }
};

/* VOLUME */
volume.oninput = () => { audio.volume = volume.value; };

/* ATUALIZA MÚSICA E CAPA */
function atualizarQuadroMusica(texto) {
  document.getElementById("current-music").textContent = texto;
}
function atualizarCapa(url, artista) {
  const img = document.getElementById("cover");
  const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(artista)}&background=0f0f0f&color=00ffcc&size=206`;
  if (!url || url.length < 10) { img.src = fallback; return; }
  const teste = new Image();
  teste.onload = () => { img.style.opacity = 0; setTimeout(() => { img.src = url; img.style.opacity = 1; }, 200); };
  teste.onerror = () => { img.src = fallback; };
  teste.src = url + "?t=" + Date.now();
}

/* API */
async function atualizar() {
  try {
    const res = await fetch("https://vox.svrdedicado.org/api/g1.BGHPCaFIIwKZX_z9dZSiZKYCoM41zevN6iEQD1qI99s?nocache=" + Date.now());
    const text = await res.text();
    if (!text.includes("<")) throw new Error("Resposta inválida");
    const xml = new DOMParser().parseFromString(text, "text/xml");

    let musica = xml.querySelector("musica_atual")?.textContent || "Ao vivo";
    let capa = xml.querySelector("capa_musica")?.textContent || "";
    let artista = "Desconhecido";

    if (musica.includes("-")) {
      const partes = musica.split("-");
      artista = partes[0].trim();
      musica = partes.slice(1).join("-").trim();
    }
    if (artista.length > 20) artista = artista.slice(0,20) + "...";

    document.getElementById("artist").textContent = "🎤 " + artista;
    atualizarQuadroMusica(musica);
    atualizarCapa(capa, artista);

  } catch {
    atualizarQuadroMusica("Erro na conexão");
  }
}

setInterval(atualizar, 10000);
atualizar();
</script>
</body>
</html>
