<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PLAYER VAQUERITOS VIP - OFICIAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <style type="text/css">
        /* Layout Base - Estilo Metálico/Dark */
        body { margin: 0; padding: 0; background: transparent; font-family: 'Reem Kufi', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .player-container {
            background: #000; 
            position: relative;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.9);
            width: 600px;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Efeito de Fundo Esfumaçado (Blur) */
        .blur-bg {
            width: 115%; height: 115%;
            background-size: cover;
            background-position: center;
            position: absolute;
            top: -7.5%; left: -7.5%;
            filter: blur(25px) brightness(0.4);
            z-index: 1;
            transition: background-image 1.2s ease-in-out;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #fff;
        }

        /* Capa do Álbum com Borda Metálica */
        .album-art {
            width: 170px;
            height: 170px;
            background: url('http://igng.com.br/api/logo.png') no-repeat center;
            background-size: cover;
            border-radius: 10px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.3);
            transition: background-image 0.5s ease;
        }

        /* Caixa de Informações e Marquee (Texto Correndo) */
        .info-box {
            width: 85%;
            margin-top: 25px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 12px 0;
            border-left: 4px solid #fff;
            border-right: 4px solid #fff;
            overflow: hidden;
        }

        .scrolling-text {
            white-space: nowrap;
            display: inline-block;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Controles e Volume */
        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .btn-play {
            width: 60px;
            height: 60px;
            cursor: pointer;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            transition: transform 0.2s;
        }
        .btn-play:active { transform: scale(0.9); }

        .status-play { background: url('https://i.imgur.com/mqkdfJP.png'); }
        .status-stop { background: url('https://i.imgur.com/Ji5iela.png'); }

        input[type=range] { width: 130px; cursor: pointer; accent-color: #fff; }

        .listeners-count {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 14px;
            background: rgba(255,255,255,0.15);
            padding: 5px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="blur-bg" id="bg-blur"></div>
    
    <div class="content">
        <div class="listeners-count">OUVINTES: <span id="qtd-ouvintes">0</span></div>
        
        <div class="album-art" id="capa-album"></div>

        <div class="info-box">
            <div class="scrolling-text" id="status-radio">CONECTANDO TRANSMISSÃO...</div>
        </div>

        <div class="controls">
            <div class="btn-play status-play" id="play-trigger"></div>
            <input type="range" id="vol-control" min="0" max="1" step="0.01" value="0.8">
        </div>

        <img src="https://i.imgur.com/c3NtUFR.gif" style="margin-top: 20px; opacity: 0.5;" width="350">
    </div>
</div>

<audio id="audio-engine" src="https://stm.igng.com.br:7018/;"></audio>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="text/javascript">
    const audio = document.getElementById('audio-engine');
    const playTrigger = $('#play-trigger');
    let ultimaMusica = "";

    // 1. PLAY / PAUSE (Com tratamento de erro para autoplay)
    playTrigger.click(function() {
        if (audio.paused) {
            audio.play().then(() => {
                playTrigger.removeClass('status-play').addClass('status-stop');
            }).catch(e => {
                console.log("Autoplay bloqueado pelo navegador. Interação do usuário necessária.", e);
            });
        } else {
            audio.pause();
            playTrigger.removeClass('status-stop').addClass('status-play');
        }
    });

    // 2. CONTROLE DE VOLUME
    $('#vol-control').on('input', function() {
        audio.volume = this.value;
    });
