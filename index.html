<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELKIT REPRO XAT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Manter seu CSS original aqui */
        *, *::before, *::after { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: transparent; }
        :root {
            --pastel-pink: #ff8acb;
            --soft-lilac: #caa6ff;
            --light-lavender: #efe7ff;
            --glass-bg: rgba(0, 0, 0, 0.65);
            --glass-border: rgba(255, 138, 203, 0.4);
        }

        .radio-widget {
            position: relative;
            width: 637px;
            height: 363px;
            font-family: 'Poppins', sans-serif;
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            user-select: none;
            display: block;
        }

        .bg-video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); z-index: 2;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
        }

        /* Layout */
        .top-left-panel { position: absolute; top: 15px; left: 15px; z-index: 10; padding: 5px 15px; border-radius: 8px; text-align: center; }
        .time-text { color: #fff; font-size: 22px; font-weight: 700; }
        .date-text { color: var(--pastel-pink); font-size: 10px; text-transform: uppercase; }

        .bottom-bar {
            position: absolute; bottom: 12px; left: 12px; right: 12px;
            height: 80px; border-radius: 20px; z-index: 10;
            display: flex; align-items: center; padding: 0 15px; gap: 15px;
        }

        .bar-left { display: flex; align-items: center; gap: 15px; }
        .main-play-btn {
            width: 55px; height: 55px; border-radius: 50%;
            background: rgba(0, 0, 0, 0.8); border: 2px solid var(--pastel-pink);
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }

        /* Capa do Álbum Fix */
        .album-wrapper { position: relative; width: 55px; height: 55px; flex-shrink: 0; }
        #sonic_art img { width: 55px !important; height: 55px !important; border-radius: 8px; object-fit: cover; border: 1px solid var(--glass-border); }

        .bar-center { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; color: white; }
        #sonic_title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--pastel-pink); }
        
        .info-badge { font-size: 10px; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; display: flex; gap: 4px; }
        
        .vol-container { display: flex; align-items: center; gap: 8px; background: var(--glass-bg); padding: 5px 10px; border-radius: 10px; }
        input[type="range"] { cursor: pointer; width: 60px; }

        /* Equalizer */
        .equalizer { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
        .eq-bar { width: 3px; background: var(--soft-lilac); height: 3px; transition: 0.2s; }
        .equalizer.active .eq-bar { animation: eq-play 0.6s infinite alternate; }
        @keyframes eq-play { 0% { height: 3px; } 100% { height: 12px; } }

        /* Badge Al Aire */
        .al-aire-badge {
            position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            background: var(--pastel-pink); color: #000; font-size: 9px;
            font-weight: 800; padding: 2px 6px; border-radius: 10px; z-index: 5;
        }
    </style>
</head>
<body>

    <div class="radio-widget">
        <video class="bg-video" autoplay loop muted playsinline>
            <source src="https://i.imgur.com/Z78pSNa.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>

        <div class="top-left-panel glass-panel">
            <div class="date-text" id="date-text">--- --/--</div>
            <div class="time-text" id="time-text">00:00</div>
        </div>

        <div class="bottom-bar glass-panel">
            
            <div class="bar-left">
                <button class="main-play-btn" id="main-play-btn">
                    <i class="fas fa-play" id="main-play-icon"></i>
                </button>
                
                <div class="album-wrapper">
                    <div class="al-aire-badge">AO VIVO</div>
                    <div id="sonic_art"></div> </div>
            </div>

            <div class="bar-center">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div id="sonic_title">Carregando música...</div>
                    <div class="equalizer" id="equalizer">
                        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 4px;">
                    <div class="info-badge">DJ: <span id="sonic_dj">Online</span></div>
                    <div class="info-badge"><i class="fas fa-user"></i> <span id="sonic_listeners">0</span></div>
                </div>
            </div>

            <div class="bar-right">
                <div class="vol-container">
                    <i class="fas fa-volume-up" style="color: var(--pastel-pink); font-size: 12px;"></i>
                    <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.75">
                </div>
            </div>
        </div>

        <audio id="audio-stream" src="http://stm.igng.com.br:7018/stream" crossorigin="anonymous"></audio>
    </div>

    <script id="sonic_js" data-port="8004" src="https://fire.doscast.com/cp/widgets.js?r=976"></script>

    <script>
        const audio = document.getElementById('audio-stream');
        const playBtn = document.getElementById('main-play-btn');
        const playIcon = document.getElementById('main-play-icon');
        const eq = document.getElementById('equalizer');
        const volSlider = document.getElementById('vol-slider');

        // Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.className = 'fas fa-pause';
                eq.classList.add('active');
            } else {
                audio.pause();
                playIcon.className = 'fas fa-play';
                eq.classList.remove('active');
            }
        });

        // Volume
        volSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // Relógio
        function updateClock() {
            const now = new Date();
            document.getElementById('time-text').textContent = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            const days = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];
            document.getElementById('date-text').textContent = `${days[now.getDay()]} ${now.getDate()}/${now.getMonth()+1}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Fallback para Metadados (Caso o widget externo falhe)
        // O Sonic Panel injeta automaticamente nos IDs 'sonic_title', 'sonic_art', etc.
    </script>
</body>
</html>
