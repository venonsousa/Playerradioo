<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Luna - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos baseados no seu design metálico/neon */
        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .player-container {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid #444;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            width: 350px;
        }

        .cover-art {
            width: 250px;
            height: 250px;
            border-radius: 15px;
            margin: 0 auto 20px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 3px solid #333;
            transition: background-image 0.5s ease-in-out;
        }

        #title-song {
            font-size: 1.2em;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
            margin-bottom: 20px;
            height: 50px;
            overflow: hidden;
        }

        .controls i {
            font-size: 2.5em;
            cursor: pointer;
            color: #ccc;
            transition: 0.3s;
        }

        .controls i:hover {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .volume-control {
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="player-container" id="player">
    <div class="cover-art" id="album-cover" style="background-image: url('https://via.placeholder.com/300?text=Radio+Luna');"></div>
    
    <div id="title-song">A carregar rádio...</div>

    <div class="controls">
        <i class="fas fa-play" id="play-btn"></i>
        <i class="fas fa-pause" id="pause-btn" style="display:none;"></i>
    </div>

    <input type="range" class="volume-control" id="volume" min="0" max="1" step="0.1" value="0.8">
    
    <audio id="audio-player" src="http://stm.igng.com.br:7018/;"></audio>
</div>

<script>
    const audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const titleSong = document.getElementById('title-song');
    const albumCover = document.getElementById('album-cover');
    const volumeSlider = document.getElementById('volume');

    // Controlo de Play/Pause
    playBtn.addEventListener('click', () => {
        audio.play();
        playBtn.style.display = 'none';
        pauseBtn.style.display = 'inline-block';
    });

    pauseBtn.addEventListener('click', () => {
        audio.pause();
        pauseBtn.style.display = 'none';
        playBtn.style.display = 'inline-block';
    });

    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });

    // Função para buscar Metadados e Capa
    async function updateMetadata() {
        try {
            // 1. Busca metadados do seu streaming (ajustado para o seu link)
            const response = await fetch('http://stm.igng.com.br:7018/stats?sid=1&json=1');
            const data = await response.json();
            const songTitle = data.songtitle;

            if (songTitle && songTitle !== titleSong.innerText) {
                titleSong.innerText = songTitle;
                getAppleMusicCover(songTitle);
            }
        } catch (error) {
            console.error("Erro ao procurar metadados:", error);
        }
    }

    // Função para procurar a capa na Apple Music API
    async function getAppleMusicCover(term) {
        try {
            const searchUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=1`;
            const response = await fetch(searchUrl);
            const data = await response.json();

            if (data.results.length > 0) {
                // Troca a resolução da imagem para 600x600
                let highResCover = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
                albumCover.style.backgroundImage = `url('${highResCover}')`;
            } else {
                // Imagem padrão caso não encontre
                albumCover.style.backgroundImage = "url('https://via.placeholder.com/300?text=Radio+Luna')";
            }
        } catch (error) {
            console.error("Erro na API da Apple Music:", error);
        }
    }

    // Atualiza a cada 15 segundos
    setInterval(updateMetadata, 15000);
    updateMetadata();

</script>

</body>
</html>
