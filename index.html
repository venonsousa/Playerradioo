<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PLAYER VAQUERITOS VIP - OFICIAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <style type="text/css">
        /* RESET E BASE */
        body { margin: 0; padding: 0; background: #000; font-family: 'Reem Kufi', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* CONTAINER DO PLAYER */
        .player-container {
            /* ADICIONADO: Nova Imagem de Fundo sobrepondo o fundo preto */
            background: #111 url('https://xatimg.com/image/Q5xotmj4LryX.png') no-repeat center/cover;
            position: relative;
            box-shadow: 0px 0px 35px rgba(0,0,0,1);
            width: 600px;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* EFEITO DE BLUR DINÂMICO (Para a Capa do Álbum) */
        .blur-bg {
            width: 120%; height: 120%;
            background-size: cover;
            background-position: center;
            position: absolute;
            top: -10%; left: -10%;
            /* Ajustado: Blur ligeiramente menor para não apagar a nova logo de fundo */
            filter: blur(25px) brightness(0.35);
            z-index: 1;
            transition: background-image 1.5s ease-in-out;
        }

        /* CONTEÚDO PRINCIPAL (Z-INDEX SUPERIOR) */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #fff;
            /* ADICIONADO: Leve sombra para garantir leitura sobre o novo fundo */
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
        }
