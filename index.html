<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemonzin - Radio Luna</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Righteous&display=swap" rel="stylesheet">
    
    <script id='sonic_js' data-port='7018' src='https://technoplayerserver.net/cp/widgets.js'></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a1a;
            overflow: hidden;
        }

        .player-container {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid white;
            border-radius: 2em;
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.4);
            padding: 40px;
            width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .blur-background {
            filter: blur(8px);
            pointer-events: none;
        }

        /* EFEITO VINIL */
        .radio-logo {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            border: 5px solid #C0C0C0;
            border-radius: 50%;
            position: relative;
            background: url('https://xatimg.com/image/Q5xotmj4LryX.png') center/cover;
            animation: vinylSpin 4s linear infinite paused;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            z-index: 5;
        }

        .playing .radio-logo { animation-play-state: running; }

        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .player-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            animation: counterRotate 4s linear infinite reverse paused;
        }

        .playing .player-controls { animation-play-state: running; }

        @keyframes counterRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .play-button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        /* CAPA DO ÁLBUM (APPLE API) */
        #sonic_art {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 90px;
            height: 90px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            border: 2px solid #fff;
            background-color: #222;
            transition: background-image 0.8s ease-in-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* INFORMAÇÕES */
        .listeners-container, .dj-wrapper {
            position: absolute;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            color: #fff;
            font-size: 13px;
        }
        .listeners-container { top: 15px; }
        .dj-wrapper { top: 55px; }

        .neon-letter {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #C0C0C0;
            margin: 15px 0;
        }

        .now-playing {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
            white-space: nowrap;
        }

        #sonic_title {
            display: inline-block;
            color: #fff;
            font-weight: bold;
            min-width: 100%;
            animation: marquee 12s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* VOLUME */
        .volume-control {
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
        }

        .volume-slider {
            cursor: pointer;
            width: 140px;
            accent-color: #C0C0C0;
        }

        /* HISTÓRICO */
        .history-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            background: #111;
            border: 2px solid #C0C0C0;
            border-radius: 15px;
            padding: 20px;
            z-index: 9999;
            display: none;
            color: #fff;
        }
        .history-container.active { display: block; }
        .close-history { float: right; cursor: pointer; background: none; border: none; color: #fff; font-size: 24px; }

        .datetime-container { font-size: 13px; color: #aaa; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="player-container" id="mainPlayer">
        <div class="listeners-container"><i class="fas fa-headphones"></i> <span id="sonic_listeners">0</span></div>
        <div class="dj-wrapper"><i class="fas fa-headset"></i> <span id="sonic_dj">AutoDj</span></div>
        
        <div id="sonic_art"></div>

        <div class="radio-logo">
            <div class="player-controls">
                <button class="play-button" id="playButton">▶</button>
            </div>
        </div>

        <div class="player-title">
            <div class="neon-letter">RADIO LUNA</div>
        </div>

        <div class="now-playing">
            <div id="sonic_title">A carregar música...</div>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-down"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="0.7">
            <span id="volumePercentage">70%</span>
        </div>

        <div class="datetime-container">
            <span id="current-time">00:00:00</span> | <span id="current-date">01/01/2025</span>
        </div>

        <button id="historyButton" style="margin-top:15px; cursor:pointer; background:#333; color:#fff; border:1px solid #555; padding:8px 20px; border-radius:20px;">
            <i class="fas fa-history"></i> Ver Histórico
        </button>
    </div>

    <div id="historyContainer" class="history-container">
        <button id="closeHistory" class="close-history">&times;</button>
        <h3><i class="fas fa-music"></i> Últimas Músicas</h3>
        <hr>
        <div id="sonic_history">A procurar histórico...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audio = new Audio("https://stm.igng.com.br:7018/stream");
            audio.volume = 0.7;
            let isPlaying = false;

            const playBtn = document.getElementById('playButton');
            const playerCont = document.getElementById('mainPlayer');
            const titleElement = document.getElementById('sonic_title');

            // 1. FUNÇÃO BUSCAR CAPA NA APPLE
            async function fetchAppleArtwork(trackName) {
                if (!trackName || trackName.includes("carregar") || trackName.length < 3) return;
                
                try {
                    const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(trackName)}&media=music&limit=1`);
                    const data = await response.json();
                    
                    if (data.results && data.results.length > 0) {
                        const imgUrl = data.results[0].artworkUrl100.replace('100x100bb', '400x400bb');
                        document.getElementById('sonic_art').style.backgroundImage = `url('${imgUrl}')`;
                    }
                } catch (err) {
                    console.log("Erro API Apple:", err);
                }
            }

            // 2. MONITOR DE MUDANÇA DE MÚSICA (OBSERVER)
            const observer = new MutationObserver(() => {
                const song = titleElement.innerText;
                fetchAppleArtwork(song);
                
                // Correção de DJ Vazio
                const dj = document.getElementById('sonic_dj');
                if(dj.innerText.trim() === "" || dj.innerText.includes("--")) {
                    dj.innerText = "AutoDj";
                }
            });
            observer.observe(titleElement, { childList: true, subtree: true });

            // 3. CONTROLOS DO PLAYER
            playBtn.addEventListener('click', () => {
                if (!isPlaying) {
                    audio.play();
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    playerCont.classList.add('playing');
                } else {
                    audio.pause();
                    playBtn.innerHTML = "▶";
                    playerCont.classList.remove('playing');
                }
                isPlaying = !isPlaying;
            });

            // Volume
            const vSlider = document.getElementById('volumeSlider');
            vSlider.addEventListener('input', (e) => {
                audio.volume = e.target.value;
                document.getElementById('volumePercentage').innerText = Math.round(e.target.value * 100) + "%";
            });

            // Data/Hora
            setInterval(() => {
                const now = new Date();
                document.getElementById('current-time').innerText = now.toLocaleTimeString();
                document.getElementById('current-date').innerText = now.toLocaleDateString();
            }, 1000);

            // 4. MODAL HISTÓRICO
            const hBtn = document.getElementById('historyButton');
            const hCont = document.getElementById('historyContainer');
            const hClose = document.getElementById('closeHistory');

            hBtn.addEventListener('click', () => {
                hCont.classList.add('active');
                playerCont.classList.add('blur-background');
            });

            hClose.addEventListener('click', () => {
                hCont.classList.remove('active');
                playerCont.classList.remove('blur-background');
            });
        });
    </script>
</body>
</html>
