<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const muteBtn = document.getElementById("muteBtn");
const volume = document.getElementById("volume");

/* 🔹 Garantir ativação do áudio em celular */
document.body.addEventListener("click", () => {
  audio.load();
}, { once: true });

/* PLAY */
playBtn.onclick = async () => {
  try {
    if (audio.paused) {
      await audio.play();
      playBtn.textContent = "⏸️";
    } else {
      audio.pause();
      playBtn.textContent = "▶️";
    }
  } catch {
    alert("Clique na tela primeiro para ativar o áudio");
  }
};

/* NEON REAGE */
audio.addEventListener("play", () => {
  document.querySelector(".player").classList.add("playing");
});

audio.addEventListener("pause", () => {
  document.querySelector(".player").classList.remove("playing");
});

/* VOLUME */
volume.oninput = () => {
  audio.volume = volume.value;
};

/* MUTE */
muteBtn.onclick = () => {
  audio.muted = !audio.muted;
  muteBtn.textContent = audio.muted ? "🔇" : "🔊";
};

/* TEXTO SCROLL PROFISSIONAL */
function atualizarTextoMusica(texto) {
  const el = document.getElementById("music");
  el.style.animation = "none";
  el.innerHTML = texto;

  if (texto.length > 25) {
    el.innerHTML = texto + " • " + texto;
    el.style.animation = "scrollMusic 12s linear infinite";
  }
}

/* CAPA INTELIGENTE */
function atualizarCapa(url, artista) {
  const img = document.getElementById("cover");
  const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(artista)}&background=0f0f0f&color=00ffcc&size=320`;

  if (!url || url.length < 10) {
    img.src = fallback;
    return;
  }

  const teste = new Image();

  teste.onload = () => {
    img.style.opacity = 0;
    setTimeout(() => {
      img.src = url;
      img.style.opacity = 1;
    }, 200);
  };

  teste.onerror = () => {
    img.src = fallback;
  };

  /* 🔹 Forçar atualização sem cache */
  teste.src = url + "?t=" + Date.now();
}

/* API COM VALIDAÇÃO XML */
async function atualizar() {
  const statusEl = document.getElementById("status");

  try {
    const res = await fetch("https://vox.svrdedicado.org/api/g1.BGHPCaFIIwKZX_z9dZSiZKYCoM41zevN6iEQD1qI99s?nocache=" + Date.now());
    
    /* 🔹 Validação do XML */
    const text = await res.text();
    if (!text.includes("<")) throw new Error("Resposta inválida");

    const xml = new DOMParser().parseFromString(text, "text/xml");

    let musica = xml.querySelector("musica_atual")?.textContent || "Ao vivo";
    let status = xml.querySelector("status")?.textContent || "0";
    let capa = xml.querySelector("capa_musica")?.textContent || "";

    let artista = "Desconhecido";

    if (musica.includes("-")) {
      let partes = musica.split("-");
      artista = partes[0].trim();
      musica = partes.slice(1).join("-").trim();
    }

    atualizarTextoMusica(musica);
    document.getElementById("artist").textContent = "🎤 " + artista;
    atualizarCapa(capa, artista);

    if (status === "1") {
      statusEl.textContent = "🟢 Rádio Online";
      statusEl.className = "status online";
    } else {
      statusEl.textContent = "🔴 Rádio Offline";
      statusEl.className = "status offline";
    }

  } catch {
    statusEl.textContent = "⚠️ Erro na conexão";
    statusEl.className = "status offline";
  }
}

setInterval(atualizar, 10000);
atualizar();
</script>
