<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio INSANO</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* PLAYER FIXO */
.player {
  display: flex;
  align-items: flex-start;
  gap: 15px;
  padding: 15px;
  border-radius: 16px;
  background: #1a1a1a;
  color: white;
  position: relative;
  width: 551px;
  height: 276px;
  min-width: 551px;
  max-width: 551px;
  min-height: 276px;
  max-height: 276px;
  box-sizing: border-box;
}

/* NEON INTELIGENTE */
.player::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 16px;
  background: linear-gradient(45deg,#00ffcc,#ff00ff,#00ffcc);
  background-size: 300%;
  z-index: -1;
  animation: none;
}
.player.playing::before { animation: neon 6s linear infinite; }
@keyframes neon { 100% { background-position: 300% } }

/* LADO ESQUERDO - QUADRO DE INFORMAÇÕES */
.info-container {
  position: relative;
  width: 177px;
  height: 123px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 10px;
  box-sizing: border-box;
  z-index: 1;
  flex-shrink: 0;
}
.info-background {
  position: absolute;
  width: 177px;
  height: 123px;
  top: 0;
  left: 0;
  border-radius: 12px;
  background: linear-gradient(45deg,#00ffcc,#ff00ff);
  opacity: 0.15;
  z-index: 0;
}
.info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  z-index: 2;
}
.radio-name { font-size: 14px; color: #00ffcc; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.station { font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.artist { font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.status { font-size: 12px; margin-top: 4px; }
#volume { width: 120px; margin-top: 4px; }

/* LADO DIREITO - CAPA, CONTROLES E MÚSICA */
.right {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.cover {
  width: 206px;
  height: 164px;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid transparent;
  background: linear-gradient(#1a1a1a, #1a1a1a) padding-box,
              linear-gradient(45deg,#00ffcc,#ff00ff) border-box;
  flex-shrink: 0;
}
.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.3s ease;
}
.controls button {
  margin: 0 5px;
  padding: 8px;
  font-size: 16px;
  background: #00ffcc;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.music-wrapper {
  width: 206px; /* igual largura da capa */
  overflow: hidden;
  white-space: nowrap;
  height: 20px;
}
.music-scroll {
  display: inline-block;
  font-size: 13px;
  font-weight: bold;
  color: #00ffcc;
}
@keyframes scrollMusic {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
</style>
</head>
<body>
<div class="player">

  <!-- LADO ESQUERDO - QUADRO DE INFORMAÇÕES -->
  <div class="info-container">
    <div class="info-background"></div>
    <div class="info">
      <div class="radio-name">RÁDIO INSANO</div>
      <div class="station">Sabor Energetico</div>
      <div class="artist" id="artist">🎤 Panda e Mayke</div>
      <div id="status" class="status offline">🔴 Rádio Offline</div>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
    </div>
  </div>

  <!-- LADO DIREITO - CAPA, CONTROLES E MÚSICA -->
  <div class="right">
    <div class="cover">
      <img id="cover" src="https://via.placeholder.com/206x164?text=Rádio">
    </div>
    <div class="controls">
      <button id="playBtn">▶️</button>
      <button id="muteBtn">🔊</button>
    </div>
    <div class="music-wrapper">
      <div id="music" class="music-scroll">Carregando...</div>
    </div>
  </div>

  <audio id="audio" preload="none">
    <source src="https://s01.svrdedicado.org:7956/stream" type="audio/mpeg">
  </audio>
</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const muteBtn = document.getElementById("muteBtn");
const volume = document.getElementById("volume");

/* Ativar áudio em mobile */
document.body.addEventListener("click", () => { audio.load(); }, { once: true });

/* PLAY */
playBtn.onclick = async () => {
  try {
    if (audio.paused) {
      await audio.play();
      playBtn.textContent = "⏸️";
    } else {
      audio.pause();
      playBtn.textContent = "▶️";
    }
  } catch {}
};

/* NEON */
audio.addEventListener("play", () => { document.querySelector(".player").classList.add("playing"); });
audio.addEventListener("pause", () => { document.querySelector(".player").classList.remove("playing"); });

/* VOLUME */
volume.oninput = () => { audio.volume = volume.value; };

/* MUTE */
muteBtn.onclick = () => { audio.muted = !audio.muted; muteBtn.textContent = audio.muted ? "🔇" : "🔊"; };

/* Atualiza música com scroll */
function atualizarTextoMusica(texto) {
  const el = document.getElementById("music");
  el.style.animation = "none";
  el.innerHTML = texto;
  if (texto.length > 20) {
    el.innerHTML = texto + " • " + texto;
    el.style.animation = "scrollMusic 12s linear infinite";
  }
}

/* Atualiza capa */
function atualizarCapa(url, artista) {
  const img = document.getElementById("cover");
  const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(artista)}&background=0f0f0f&color=00ffcc&size=206`;
  if (!url || url.length < 10) { img.src = fallback; return; }
  const teste = new Image();
  teste.onload = () => { img.style.opacity = 0; setTimeout(() => { img.src = url; img.style.opacity = 1; }, 200); };
  teste.onerror = () => { img.src = fallback; };
  teste.src = url + "?t=" + Date.now();
}

/* API */
async function atualizar() {
  const statusEl = document.getElementById("status");
  try {
    const res = await fetch("https://vox.svrdedicado.org/api/g1.BGHPCaFIIwKZX_z9dZSiZKYCoM41zevN6iEQD1qI99s?nocache=" + Date.now());
    const text = await res.text();
    if (!text.includes("<")) throw new Error("Resposta inválida");
    const xml = new DOMParser().parseFromString(text, "text/xml");

    let musica = xml.querySelector("musica_atual")?.textContent || "Ao vivo";
    let status = xml.querySelector("status")?.textContent || "0";
    let capa = xml.querySelector("capa_musica")?.textContent || "";

    let artista = "Desconhecido";
    if (musica.includes("-")) {
      let partes = musica.split("-");
      artista = partes[0].trim();
      musica = partes.slice(1).join("-").trim();
    }

    if (artista.length > 20) artista = artista.slice(0,20) + "...";

    document.getElementById("artist").textContent = "🎤 " + artista;
    atualizarTextoMusica(musica);
    atualizarCapa(capa, artista);

    if (status === "1") {
      statusEl.textContent = "🟢 Rádio Online";
      statusEl.className = "status online";
    } else {
      statusEl.textContent = "🔴 Rádio Offline";
      statusEl.className = "status offline";
    }
  } catch {
    statusEl.textContent = "⚠️ Erro na conexão";
    statusEl.className = "status offline";
  }
}

setInterval(atualizar, 10000);
atualizar();
</script>
</body>
</html>
