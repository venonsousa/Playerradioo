<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYER - BOTECO PREMIUM V1</title>

<style>
body{
  margin:0;
  background:transparent;
  font-family:Arial;
}

/* PLAYER FIXO */
.player{
  position:fixed;
  top:0;
  left:0;
  width:340px;
  background:rgba(30,30,30,0.85);
  border-radius:20px;
  padding:20px;
  text-align:center;
  backdrop-filter:blur(20px);
  z-index:9999;
}

/* FUNDO */
.bg{
  position:absolute;
  inset:0;
  border-radius:20px;
  background:url('https://xatimg.com/image/wtJkTmxDqR2U.png') center/cover;
  filter:blur(40px) brightness(0.25);
  z-index:0;
  pointer-events:none;
}

.player *{
  position:relative;
  z-index:1;
}

.radio-name{
  font-size:20px;
  font-weight:bold;
  color:#fff;
  margin-bottom:10px;
  text-transform:uppercase;
}

.cover{
  width:100%;
  aspect-ratio:1/1;
  border-radius:15px;
  background:url('https://xatimg.com/image/wtJkTmxDqR2U.png') center/contain no-repeat;
  background-color:#1a1a1a;
  margin-bottom:15px;
}

.artist,
.music,
.listeners{
  color:#fff;
  font-weight:bold;
}

.artist{color:#d1d1d1;font-size:14px}
.music{font-size:18px}
.listeners{font-size:12px;color:#bbb;margin-bottom:12px}

.controls{
  display:flex;
  align-items:center;
  gap:10px;
}

button{
  display:flex;
  align-items:center;
  gap:8px;
  background:#fff;
  color:#000;
  border:none;
  padding:12px 18px;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.icon{
  width:14px;
  height:14px;
  fill:#000;
}

.volume-box{
  flex:1;
  text-align:right;
}

#volume{
  width:100%;
  height:4px;
}

#volPercent{
  margin-top:8px;
  font-size:12px;
  color:#ddd;
}

/* EQUALIZER */
.eq{
  display:flex;
  justify-content:center;
  gap:4px;
  margin-top:15px;
  height:24px;
}

.bar{
  width:4px;
  background:#ffffff;
  border-radius:2px;
}
</style>
</head>

<body>

<div class="player">
  <div class="bg"></div>

  <div class="radio-name">Boteco Premium</div>
  <div class="cover"></div>

  <div class="artist" id="artist">Carregando...</div>
  <div class="music" id="music"></div>
  <div class="listeners" id="listeners">Ouvintes: --</div>

  <div class="controls">
    <button onclick="togglePlay()" id="playBtn">
      <svg id="btnIcon" class="icon" viewBox="0 0 24 24">
        <polygon points="5,3 19,12 5,21"></polygon>
      </svg>
      <span id="btnText">PLAY</span>
    </button>

    <div class="volume-box">
      <input type="range" min="0" max="1" step="0.01" value="1" id="volume">
      <div id="volPercent">Volume: 100%</div>
    </div>
  </div>

  <div class="eq">
    <div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
    <div class="bar"></div>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const streamURL="https://stm.igng.com.br:7018/stream";
const apiXML="https://igng.com.br/api/NzAxOCsx";
const apiJSON="https://igng.com.br/api-json/NzAxOCsx";

const audio=document.getElementById("audio");
const btnText=document.getElementById("btnText");
const btnIcon=document.getElementById("btnIcon");

const volume=document.getElementById("volume");
const volText=document.getElementById("volPercent");

const artistEl=document.getElementById("artist");
const musicEl=document.getElementById("music");
const listenersEl=document.getElementById("listeners");

audio.volume=1;
let playing=false;

let ctx, analyser;

/* INIT AUDIO (ANDROID FIX) */
function initAudio(){
 if(!ctx){
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  analyser=ctx.createAnalyser();
  const source=ctx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(ctx.destination);
  animateEQ();
 }
}

/* EQUALIZER */
function animateEQ(){
 const bars=document.querySelectorAll('.bar');
 const data=new Uint8Array(analyser.frequencyBinCount);

 function loop(){
  analyser.getByteFrequencyData(data);
  bars.forEach((b,i)=>{
    b.style.height=(5+(data[i]/255)*25)+"px";
  });
  requestAnimationFrame(loop);
 }
 loop();
}

/* PLAY */
async function togglePlay(){
 try{
  if(!playing){
    initAudio();
    await ctx.resume();
    audio.src=streamURL+"?t="+Date.now();
    await audio.play();

    btnText.innerText="STOP";
    btnIcon.innerHTML='<rect x="6" y="6" width="12" height="12"></rect>';
    playing=true;

  }else{
    audio.pause();
    audio.src="";
    btnText.innerText="PLAY";
    btnIcon.innerHTML='<polygon points="5,3 19,12 5,21"></polygon>';
    playing=false;
  }
 }catch(e){
  console.log("Erro ao tocar:",e);
 }
}

/* VOLUME */
volume.oninput=()=>{
 audio.volume=volume.value;
 volText.innerText="Volume: "+Math.round(volume.value*100)+"%";
};

/* LIMPAR TITULO */
function cleanTitle(text){
 return text
  .replace(/\(.*?\)|\[.*?\]/g,'')
  .replace(/official|video|hd|4k|lyrics/gi,'')
  .replace(/\s+/g,' ')
  .trim();
}

/* FETCH */
async function fetchTextISO(url){
 const res=await fetch(url);
 const buffer=await res.arrayBuffer();
 return new TextDecoder('iso-8859-1').decode(buffer);
}

async function fetchRadioData(){
 try{
  let text=await fetchTextISO(apiJSON);
  let data=JSON.parse(text);

  let fullTitle=cleanTitle(data.musica_atual||"Sem música");
  let listeners=data.ouvintes_conectados||0;

  let artist="-",music=fullTitle;

  if(fullTitle.includes(" - ")){
    let p=fullTitle.split(" - ");
    artist=p[0];
    music=p.slice(1).join(" - ");
  }

  artistEl.innerText=artist;
  musicEl.innerText=music;
  listenersEl.innerText="Ouvintes: "+listeners;

 }catch(e){
  console.log("Erro API:",e);
 }
}

setInterval(fetchRadioData,5000);
fetchRadioData();
</script>

</body>
</html>
