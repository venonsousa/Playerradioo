<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PLAYER VAQUERITOS VIP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <style type="text/css">
        body { margin: 0; padding: 0; background: transparent; font-family: 'Reem Kufi', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .player-container {
            background: #000; 
            position: relative;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.9);
            width: 600px;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .blur-bg {
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            position: absolute;
            top: -5%; left: -5%;
            filter: blur(20px);
            opacity: 0.5;
            z-index: 1;
            transition: background-image 1s ease-in-out;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #fff;
        }

        .album-art {
            width: 160px;
            height: 160px;
            background: url('http://igng.com.br/api/logo.png') no-repeat center;
            background-size: cover;
            border-radius: 10px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .info-box {
            width: 80%;
            margin-top: 20px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-left: 4px solid #fff;
            border-right: 4px solid #fff;
            overflow: hidden;
        }

        .scrolling-text {
            white-space: nowrap;
            display: inline-block;
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            animation: marquee 12s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .controls {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-play {
            width: 55px;
            height: 55px;
            cursor: pointer;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            transition: 0.3s;
        }

        .status-play { background: url('https://i.imgur.com/mqkdfJP.png'); }
        .status-stop { background: url('https://i.imgur.com/Ji5iela.png'); }

        input[type=range] { width: 120px; cursor: pointer; }

        .listeners-count {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="blur-bg" id="bg-blur"></div>
    
    <div class="content">
        <div class="listeners-count">OUVINTES: <span id="qtd-ouvintes">0</span></div>
        
        <div class="album-art" id="capa-album"></div>

        <div class="info-box">
            <div class="scrolling-text" id="status-radio">CONECTANDO...</div>
        </div>

        <div class="controls">
            <div class="btn-play status-play" id="play-trigger"></div>
            <input type="range" id="vol-control" min="0" max="1" step="0.05" value="0.8">
        </div>

        <img src="https://i.imgur.com/c3NtUFR.gif" style="margin-top: 15px; opacity: 0.6;" width="320">
    </div>
</div>

<audio id="audio-engine" src="http://stm.igng.com.br:7018/;"></audio>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="text/javascript">
    const audio = document.getElementById('audio-engine');
    let ultimaMusica = "";

    // FUNÇÃO PLAY/PAUSE
    $('#play-trigger').click(function() {
        if (audio.paused) {
            audio.play();
            $(this).removeClass('status-play').addClass('status-stop');
        } else {
            audio.pause();
            $(this).removeClass('status-stop').addClass('status-play');
        }
    });

    // VOLUME
    $('#vol-control').on('input', function() {
        audio.volume = this.value;
    });

    // BUSCA CAPA NA APPLE MUSIC
    function buscarCapaApple(termo) {
        if (termo === ultimaMusica || termo.includes("VAQUERITOS")) return;
        ultimaMusica = termo;

        $.ajax({
            url: `https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&media=music&limit=1`,
            dataType: 'jsonp',
            success: function(data) {
                if (data.results.length > 0) {
                    let img = data.results[0].artworkUrl100.replace('100x100bb', '1000x1000bb');
                    $('#capa-album').css('background-image', `url(${img})`);
                    $('#bg-blur').css('background-image', `url(${img})`);
                } else {
                    resetCapa();
                }
            },
            error: resetCapa
        });
    }

    function resetCapa() {
        $('#capa-album').css('background-image', "url('http://igng.com.br/api/logo.png')");
        $('#bg-blur').css('background-image', "none");
    }

    // ATUALIZA DADOS DA SUA API
    function atualizarDadosRadio() {
        $.getJSON('http://igng.com.br/api/VG5wQmVFOUJQVDA9KzM=', function(data) {
            // Ajuste os campos abaixo conforme o retorno exato da sua API
            // Supondo que sua API retorne: { "musica": "...", "ouvintes": "..." }
            const musicaAtual = data.musica || "VAQUERITOS VIP ONLINE";
            const ouvintes = data.ouvintes || "0";

            $('#status-radio').text(musicaAtual.toUpperCase());
            $('#qtd-ouvintes').text(ouvintes);

            buscarCapaApple(musicaAtual);
        }).fail(function() {
            console.log("Erro ao acessar API igng.com.br");
        });
    }

    // Loop de atualização (7 segundos)
    setInterval(atualizarDadosRadio, 7000);
    atualizarDadosRadio();
</script>

</body>
</html>
