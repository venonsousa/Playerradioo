<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Radio Luna - Prata</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Righteous&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        :root {
            --silver-light: #E8E8E8;
            --silver-mid: #C0C0C0;
            --silver-dark: #7F7A83;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #121212;
            overflow: hidden;
        }

        .player-container {
            background: rgba(30, 30, 30, 0.8);
            border: 2px solid var(--silver-mid);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.3);
            padding: 40px;
            width: 380px;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2;
        }

        .radio-logo {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border: 4px solid var(--silver-mid);
            border-radius: 50%;
            position: relative;
            background: #000;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .radio-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: vinylSpin 4s linear infinite paused;
        }

        .playing img { animation-play-state: running; }

        @keyframes vinylSpin { to { transform: rotate(360deg); } }

        .play-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            z-index: 10;
        }

        .neon-title {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 1.8rem;
            text-shadow: 0 0 10px var(--silver-mid);
            margin-bottom: 20px;
        }

        .audio-visualizer {
            display: flex;
            justify-content: center;
            gap: 4px;
            height: 30px;
            align-items: flex-end;
            margin: 15px 0;
        }

        .bar { width: 6px; height: 4px; background: var(--silver-mid); border-radius: 2px; }
        .playing .bar { animation: barDance 0.8s infinite ease-in-out alternate; }
        @keyframes barDance { from { height: 4px; } to { height: 30px; background: #fff; } }

        .info-box {
            font-size: 12px;
            color: #bbb;
            margin-top: 10px;
            font-family: 'Orbitron', sans-serif;
        }

        #current-song {
            color: #fff;
            font-weight: bold;
            display: block;
            margin: 10px 0;
            height: 1.2em;
            overflow: hidden;
        }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        input[type=range] {
            cursor: pointer;
            width: 120px;
            accent-color: var(--silver-mid);
        }

        .stats-float {
            position: absolute;
            top: 15px; left: 15px;
            font-size: 10px;
            color: #00ff00;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="player-container" id="mainPlayer">
        <div class="stats-float">
            <i class="fas fa-circle"></i> NO AR<br>
            <i class="fas fa-users"></i> <span id="listeners">0</span> OUVINTES
        </div>

        <div class="radio-logo">
            <img src="https://xatimg.com/image/Q5xotmj4LryX.png" alt="Logo">
            <button class="play-button" id="btnPlay"><i class="fas fa-play"></i></button>
        </div>

        <div class="neon-title">RADIO LUNA</div>

        <div id="current-song">Carregando...</div>

        <div class="audio-visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-down" style="color:white"></i>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.8">
        </div>

        <div class="info-box">
            <span id="clock">00:00:00</span>
        </div>
    </div>

    <script>
        const streamUrl = "https://stm.igng.com.br:7018/;"; // O ';' força o reconhecimento como áudio
        const apiUrl = "http://igng.com.br/api/VG5wQmVFOUJQVDA9KzM=";
        const audio = new Audio(streamUrl);
        let playing = false;

        // Play / Pause
        $('#btnPlay').click(function() {
            if (!playing) {
                audio.play();
                $(this).html('<i class="fas fa-pause"></i>');
                $('#mainPlayer').addClass('playing');
            } else {
                audio.pause();
                $(this).html('<i class="fas fa-play"></i>');
                $('#mainPlayer').removeClass('playing');
            }
            playing = !playing;
        });

        // Volume
        $('#volume').on('input', function() {
            audio.volume = $(this).val();
        });

        // Relógio
        setInterval(() => {
            $('#clock').text(new Date().toLocaleTimeString('pt-BR'));
        }, 1000);

        // API Data
        function getRadioData() {
            $.getJSON(apiUrl, function(data) {
                // Ajustado para o formato padrão de APIs Shoutcast/Icecast
                if(data.now_playing) {
                    const track = data.now_playing.song;
                    $('#current-song').text(track.artist + " - " + track.title);
                    $('#listeners').text(data.listeners.total);
                }
            }).fail(function() {
                console.log("Erro ao ler API");
            });
        }

        setInterval(getRadioData, 20000); // Atualiza a cada 20s
        getRadioData();
    </script>
</body>
</html>
