<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio INSANO</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

.player {
  width: 320px;
  padding: 20px;
  border-radius: 20px;
  background: #1a1a1a;
  color: white;
  text-align: center;
  position: relative;
}

/* NEON CONTROLADO */
.player::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 20px;
  background: linear-gradient(45deg,#00ffcc,#ff00ff,#00ffcc);
  background-size: 300%;
  z-index: -1;
  animation: none;
}

.player.playing::before {
  animation: neon 6s linear infinite;
}

@keyframes neon {
  100% { background-position: 300% }
}

.cover {
  width: 180px;
  height: 180px;
  margin: auto;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 20px #00ffcc;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.3s ease;
}

.grid {
  display: grid;
  gap: 10px;
  margin-top: 15px;
}

.radio-name {
  font-size: 14px;
  color: #00ffcc;
  font-weight: bold;
}

.music-wrapper {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  height: 20px;
}

.music-scroll {
  display: inline-block;
}

@keyframes scrollMusic {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}

.artist {
  font-size: 13px;
  color: #ccc;
}

.status { font-size: 12px; margin-top: 5px; }
.online { color: #00ff00; }
.offline { color: red; }

.controls button {
  margin: 5px;
  padding: 10px;
  font-size: 18px;
  background: #00ffcc;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

input[type="range"] {
  width: 100%;
  accent-color: #00ffcc;
}
</style>
</head>

<body>

<div class="player">

  <div class="cover">
    <img id="cover" src="https://via.placeholder.com/300x300?text=Rádio">
  </div>

  <div class="grid">

    <div class="radio-name">RÁDIO INSANO</div>

    <div class="music-wrapper">
      <div id="music" class="music-scroll">Carregando...</div>
    </div>

    <div id="artist" class="artist"></div>
    <div id="status" class="status">Conectando...</div>

    <div class="controls">
      <button id="playBtn">▶️</button>
      <button id="muteBtn">🔊</button>
    </div>

    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">

  </div>

  <audio id="audio" preload="none">
    <source src="https://s01.svrdedicado.org:7956/stream" type="audio/mpeg">
  </audio>

</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const muteBtn = document.getElementById("muteBtn");
const volume = document.getElementById("volume");

/* PLAY */
playBtn.onclick = async () => {
  try {
    if (audio.paused) {
      await audio.play();
      playBtn.textContent = "⏸️";
    } else {
      audio.pause();
      playBtn.textContent = "▶️";
    }
  } catch {
    alert("Clique na tela primeiro para ativar o áudio");
  }
};

/* CONTROLE VISUAL */
audio.addEventListener("play", () => {
  document.querySelector(".player").classList.add("playing");
});

audio.addEventListener("pause", () => {
  document.querySelector(".player").classList.remove("playing");
});

/* VOLUME */
volume.oninput = () => {
  audio.volume = volume.value;
};

/* MUTE */
muteBtn.onclick = () => {
  audio.muted = !audio.muted;
  muteBtn.textContent = audio.muted ? "🔇" : "🔊";
};

/* TEXTO */
function atualizarTextoMusica(texto) {
  const el = document.getElementById("music");

  el.style.animation = "none";
  el.offsetHeight;

  el.textContent = texto;

  if (texto.length > 25) {
    el.style.animation = "scrollMusic 12s linear infinite";
  }
}

/* CAPA */
function atualizarCapa(url) {
  const img = document.getElementById("cover");

  if (!url) {
    img.src = "https://via.placeholder.com/300x300?text=Sem+Capa";
    return;
  }

  const teste = new Image();
  teste.onload = () => {
    img.style.opacity = 0;
    setTimeout(() => {
      img.src = url;
      img.style.opacity = 1;
    }, 200);
  };
  teste.onerror = () => {
    img.src = "https://via.placeholder.com/300x300?text=Erro";
  };
  teste.src = url;
}

/* API */
async function atualizar() {
  const statusEl = document.getElementById("status");

  try {
    const res = await fetch("https://vox.svrdedicado.org/api/g1.BGHPCaFIIwKZX_z9dZSiZKYCoM41zevN6iEQD1qI99s?nocache=" + Date.now());

    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, "text/xml");

    let musica = xml.querySelector("musica_atual")?.textContent || "Ao vivo";
    let status = xml.querySelector("status")?.textContent || "0";
    let capa = xml.querySelector("capa_musica")?.textContent || "";

    let artista = "Desconhecido";

    if (musica.includes("-")) {
      let partes = musica.split("-");
      artista = partes[0].trim();
      musica = partes.slice(1).join("-").trim();
    }

    atualizarTextoMusica(musica);
    document.getElementById("artist").textContent = "🎤 " + artista;
    atualizarCapa(capa);

    if (status === "1") {
      statusEl.textContent = "🟢 Rádio Online";
      statusEl.className = "status online";
    } else {
      statusEl.textContent = "🔴 Rádio Offline";
      statusEl.className = "status offline";
    }

  } catch {
    statusEl.textContent = "⚠️ Erro na conexão";
    statusEl.className = "status offline";
  }
}

setInterval(atualizar, 10000);
atualizar();
</script>

</body>
</html>
