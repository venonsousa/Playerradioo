<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio INSANO</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

.player {
  position: relative;
  display: flex;
  justify-content: space-between;
  padding: 15px;
  border-radius: 16px;
  width: 551px;
  height: 276px;
  overflow: hidden;
  color: white;
}

/* VIDEO */
.player video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* INFO */
.info-container {
  position: relative;
  width: 291px;
  padding-left: 53px;
}
.info-background {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg,#00ffcc,#ff00ff);
  opacity: 0.15;
  border-radius: 12px;
}
.info { position: relative; }

.radio-name { color:#00ffcc; font-weight:bold; }
.station { color:#aaa; }
.artist { color:#fff; }

/* TEXTO */
#current-music {
  white-space: nowrap;
  overflow: hidden;
}
#current-music span {
  display: inline-block;
  padding-left: 100%;
  animation: marquee 10s linear infinite;
}
@keyframes marquee {
  100% { transform: translateX(-100%); }
}

/* DIREITA */
.right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
}

/* CAPA */
.cover {
  position: relative;
  width: 206px;
  height: 164px;
  border-radius: 12px;
  overflow: hidden;
  background: #1a1a1a;
}
.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🎵 NOTAS */
.notes {
  position: absolute;
  bottom: 10px;
  right: 10px;
}
.note {
  position: absolute;
  font-size: 18px;
  color: #00ffcc;
  animation: floatNote 3s linear;
}
@keyframes floatNote {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-120px); opacity: 0; }
}

/* 🔥 BOTÃO PLAY NOVO */
#playBtn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #00ffcc, #ff00ff);
  color: #0f0f0f;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 10px #00ffcc, 0 0 20px #ff00ff;
  transition: all 0.3s ease;
}

#playBtn:hover {
  transform: scale(1.2) rotate(10deg);
  box-shadow: 0 0 20px #00ffcc, 0 0 40px #ff00ff;
}

/* PULSANDO */
.player.playing #playBtn {
  animation: pulse 1s infinite alternate;
}
@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.15); }
}

/* SOCIAL NOVO */
.social-btn {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,204,0.3);
  color: #00ffcc;

  transition: all 0.3s ease;
}

.social-btn:hover {
  transform: translateY(-5px) scale(1.1);
  background: linear-gradient(135deg,#00ffcc,#ff00ff);
  color: #0f0f0f;
  box-shadow: 0 0 15px #00ffcc, 0 0 25px #ff00ff;
}
</style>
</head>

<body>

<div class="player" id="player">

<video autoplay muted loop>
  <source src="https://i.imgur.com/z23V8dZ.mp4">
</video>

<div class="info-container">
  <div class="info-background"></div>
  <div class="info">
    <div class="radio-name">RÁDIO INSANO</div>
    <div class="station">Sabor Energético</div>
    <div class="artist" id="artist">🎤 Ao vivo</div>
    <div id="current-music"><span>Carregando...</span></div>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<div class="right">
  <div class="cover">
    <img id="cover" src="https://via.placeholder.com/206x164">

    <div class="notes" id="notes"></div>
  </div>

  <div style="display:flex; gap:10px;">
    <button id="playBtn">▶️</button>
    <a href="#" class="social-btn">📘</a>
    <a href="#" class="social-btn">📸</a>
    <a href="#" class="social-btn">🐦</a>
  </div>
</div>

<audio id="audio">
  <source src="https://s01.svrdedicado.org:7956/stream">
</audio>

</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const player = document.getElementById("player");

/* PLAY */
playBtn.onclick = async () => {
  if(audio.paused){
    await audio.play();
    playBtn.textContent="⏸️";
    player.classList.add("playing");
  } else {
    audio.pause();
    playBtn.textContent="▶️";
    player.classList.remove("playing");
  }
};

/* 🎵 NOTAS */
const notes = document.getElementById("notes");

function criarNota(){
  const n=document.createElement("div");
  n.className="note";
  n.textContent=["🎵","🎶","♪"][Math.floor(Math.random()*3)];
  n.style.left=Math.random()*40+"px";
  notes.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

setInterval(()=>{
  if(!audio.paused) criarNota();
},500);
</script>

</body>
</html>
