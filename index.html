<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemonzin</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    
    <script id='sonic_js' data-port='7018' src='https://technoplayerserver.net/cp/widgets.js'></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
   
    <style>
        /* Estilos base preservados do seu original */
        .bydev {
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: #fff;
            text-align: right;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
        }
        
        .player-container {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid white;
            border-radius: 1em;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.4), inset 0 0 20px rgba(232, 232, 232, 0.3);
            padding: 56px;
            width: 430px;
            height: 29em;
            text-align: center;
            backdrop-filter: blur(2px);
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease, filter 0.5s ease;
        }

        /* Animações de Água e Som preservadas */
        .player-container.playing::before,
        .player-container.playing::after {
            content: "";
            position: absolute;
            left: 0; top: 0; width: 200%; height: 200%;
            opacity: 1;
            z-index: 1;
            mix-blend-mode: soft-light;
            animation: waterEffect1 6s infinite linear;
        }

        @keyframes waterEffect1 {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .radio-logo {
            width: 120px;
            height: 120px;
            margin: 25px auto 20px;
            border: 3px solid #C0C0C0;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            animation: vinylSpin 3s linear infinite;
            box-shadow: 0 0 15px #C0C0C0;
            z-index: 3;
        }

        @keyframes vinylSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #sonic_art {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 100px;
            height: 100px;
            border-radius: 5px;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 10;
            background-size: cover;
            background-position: center;
            transition: all 0.8s ease-in-out; /* Suaviza a troca da capa da Apple */
            border: 1px solid rgba(255,255,255,0.2);
        }

        .now-playing {
            color: white;
            margin-top: 20px;
            padding: 10px 5px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 5px;
            overflow: hidden;
            height: 30px;
            display: flex;
            align-items: center;
        }

        #sonic_title {
            font-weight: bold;
            white-space: nowrap;
            animation: marquee-contained 12s linear infinite;
            font-size: 1.2em;
            color: #fff;
        }

        @keyframes marquee-contained {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Outros estilos omitidos por brevidade, mas mantidos no seu código original */
        .volume-control { margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .datetime-container { color: white; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 5px; margin-top: 10px; display: flex; justify-content: center; gap: 10px; font-size: 12px; }
        .history-button { background: rgba(192,192,192,0.7); color: white; border: none; padding: 5px 10px; border-radius: 15px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="listeners-container">
            <i class="fas fa-headphones"></i> <span id='sonic_listeners'>--</span>
        </div>
        <div class="dj-wrapper">
            <i class="fas fa-headset"></i> <div id="sonic_dj">AutoDj</div>
        </div>

        <div id='sonic_art'></div>

        <div class="radio-logo">
            <div class="player-controls">
                <button class="play-button" id="playButton" style="background:none; border:none; color:white; font-size:30px; cursor:pointer;">▶</button>
            </div>
        </div>

        <div class="player-title">
            <h2 style="font-family:'Orbitron'; color:white; text-shadow: 0 0 10px #fff;">RADIO LUNA</h2>
        </div>
        
        <div class="volume-control">
            <i id="volumeIcon" class="fas fa-volume-down"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.7">
            <span id="volumePercentage">70%</span>
        </div>

        <div class="now-playing">
            <div id='sonic_title'>Cargando...</div>
        </div>

        <div class="datetime-container">
            <span id="current-time">00:00:00</span> | <span id="current-date">01/01/2025</span>
        </div>

        <button id="historyButton" class="history-button"><i class="fas fa-history"></i> Historial</button>
        
        <div style="margin-top:10px;">
            <span class="bydev">Developer by sebascript</span>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- 1. CONFIGURAÇÃO DO PLAYER ---
        const playButton = document.getElementById('playButton');
        const audio = new Audio("https://stm.igng.com.br:7018/stream");
        audio.volume = 0.7;
        let isPlaying = false;

        playButton.addEventListener('click', function() {
            if (isPlaying) {
                audio.pause();
                playButton.innerHTML = "▶";
                document.querySelector('.player-container').classList.remove('playing');
            } else {
                audio.play();
                playButton.innerHTML = "⏸";
                document.querySelector('.player-container').classList.add('playing');
            }
            isPlaying = !isPlaying;
        });

        // --- 2. INTEGRAÇÃO APPLE MUSIC API ---
        let currentSong = '';
        const sonicArt = document.getElementById('sonic_art');
        const sonicTitle = document.getElementById('sonic_title');

        async function fetchAppleMusicData(songTitle) {
            if (!songTitle || songTitle.includes('BIENVENIDOS')) return;

            try {
                // Limpa o texto para busca (remove "Radio", parênteses, etc)
                const query = songTitle.split('(')[0].split('-').join(' ').trim();
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1`);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    const track = data.results[0];
                    // Capa em 500x500
                    const artUrl = track.artworkUrl100.replace('100x100bb', '500x500bb');
                    sonicArt.style.backgroundImage = `url('${artUrl}')`;
                    
                    // Opcional: Atualiza o título para o nome oficial
                    // sonicTitle.textContent = `${track.artistName} - ${track.trackName}`;
                    console.log("Apple Match:", track.artistName);
                } else {
                    // Se não achar, volta para o logo padrão
                    sonicArt.style.backgroundImage = 'url("https://xatimg.com/image/Q5xotmj4LryX.png")';
                }
            } catch (e) { console.error("Erro Apple API", e); }
        }

        // --- 3. MONITOR DE ATUALIZAÇÕES (Tudo junto) ---
        function monitorUpdates() {
            // Título e Música
            if (sonicTitle) {
                let songText = sonicTitle.textContent.trim();
                if (songText === '' || songText === '--' || songText.toLowerCase().includes('en vivo')) {
                    sonicTitle.textContent = 'BIENVENIDOS A RADIO LUNA';
                    songText = 'BIENVENIDOS A RADIO LUNA';
                }

                if (songText !== currentSong) {
                    currentSong = songText;
                    fetchAppleMusicData(songText); // Chama a Apple Music
                }
            }

            // Lógica do DJ
            const sonicDj = document.getElementById('sonic_dj');
            if (sonicDj) {
                const djText = sonicDj.textContent.trim();
                if (djText === '' || djText === '--' || djText.toLowerCase().includes('no dj')) {
                    sonicDj.textContent = 'AutoDj';
                }
            }
        }

        setInterval(monitorUpdates, 3000);

        // --- 4. DATA E HORA ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString();
            document.getElementById('current-date').textContent = now.toLocaleDateString();
        }, 1000);

        // --- 5. VOLUME ---
        const volSlider = document.getElementById('volumeSlider');
        volSlider.addEventListener('input', () => {
            audio.volume = volSlider.value;
            document.getElementById('volumePercentage').textContent = Math.round(volSlider.value * 100) + '%';
        });
    });
    </script>
</body>
</html>
