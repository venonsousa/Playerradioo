<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio INSANO</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* PLAYER */
.player {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  border-radius: 16px;
  width: 551px;
  height: 276px;
  overflow: hidden;
  color: white;
}

/* VIDEO */
.player video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* INFO */
.info-container {
  position: relative;
  width: 280px;
  height: 140px;
  display: flex;
  align-items: center;
  padding: 15px;
  z-index: 2;
}

.info-background {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  background: linear-gradient(45deg,#00ffcc,#ff00ff);
  opacity: 0.15;
}

.info {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}

.radio-name { color:#00ffcc; font-weight:bold; }
.station { color:#aaa; }
.artist { color:#fff; }

/* TEXTO ROLANDO */
#current-music {
  width: 100%;
  overflow: hidden;
}

#current-music span {
  display: inline-block;
  white-space: nowrap;
  animation: marquee 10s linear infinite;
}

@keyframes marquee {
  100% { transform: translateX(-100%); }
}

/* VOLUME */
#volume { width: 100%; }

/* DIREITA */
.right {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 2;
}

/* CAPA */
.cover {
  position: relative;
  width: 206px;
  height: 164px;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #1a1a1a;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.3s ease;
}

/* 🎵 NOTAS */
.notes {
  position: absolute;
  bottom: 10px;
  right: 10px;
}
.note {
  position: absolute;
  font-size: 18px;
  color: #00ffcc;
  animation: floatNote 3s linear;
}
@keyframes floatNote {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-120px); opacity: 0; }
}

/* 🔥 PLAY */
#playBtn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg,#00ffcc,#ff00ff);
  color: #0f0f0f;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 0 10px #00ffcc, 0 0 20px #ff00ff;
  transition: 0.3s;
}

#playBtn:hover {
  transform: scale(1.2) rotate(10deg);
}

.player.playing #playBtn {
  animation: pulse 1s infinite alternate;
}
@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.15); }
}

/* SOCIAL */
.social-btn {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,204,0.3);
  color: #00ffcc;
  text-decoration: none;
  transition: 0.3s;
}

.social-btn:hover {
  transform: translateY(-5px) scale(1.1);
  background: linear-gradient(135deg,#00ffcc,#ff00ff);
  color: #0f0f0f;
}
</style>
</head>

<body>

<div class="player" id="player">

<video autoplay muted loop>
  <source src="https://i.imgur.com/z23V8dZ.mp4">
</video>

<div class="info-container">
  <div class="info-background"></div>
  <div class="info">
    <div class="radio-name">RÁDIO INSANO</div>
    <div class="station">Sabor Energético</div>
    <div class="artist" id="artist">🎤 Carregando...</div>
    <div id="current-music"><span>Carregando música...</span></div>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>
</div>

<div class="right">
  <div class="cover">
    <img id="cover" src="https://via.placeholder.com/206x164">
    <div class="notes" id="notes"></div>
  </div>

  <div style="display:flex; gap:10px;">
    <button id="playBtn">▶️</button>
    <a href="#" class="social-btn">📘</a>
    <a href="#" class="social-btn">📸</a>
    <a href="#" class="social-btn">🐦</a>
  </div>
</div>

<audio id="audio">
  <source src="https://s01.svrdedicado.org:7956/stream">
</audio>

</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const player = document.getElementById("player");

/* PLAY */
playBtn.onclick = async () => {
  if(audio.paused){
    await audio.play();
    playBtn.textContent="⏸️";
    player.classList.add("playing");
  } else {
    audio.pause();
    playBtn.textContent="▶️";
    player.classList.remove("playing");
  }
};

/* VOLUME */
document.getElementById("volume").oninput = e => {
  audio.volume = e.target.value;
};

/* 🎵 NOTAS */
const notes = document.getElementById("notes");

function criarNota(){
  const n=document.createElement("div");
  n.className="note";
  n.textContent=["🎵","🎶","♪"][Math.floor(Math.random()*3)];
  n.style.left=Math.random()*40+"px";
  notes.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

setInterval(()=>{
  if(!audio.paused) criarNota();
},500);

/* 🍎 BUSCAR CAPA ITUNES */
async function buscarCapaItunes(artista, musica) {
  try {
    const termo = encodeURIComponent(`${artista} ${musica}`);
    const url = `https://itunes.apple.com/search?term=${termo}&entity=song&limit=1`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.results && data.results.length > 0) {
      return data.results[0].artworkUrl100.replace("100x100bb.jpg","600x600bb.jpg");
    }
  } catch(e){
    console.log("Erro iTunes:", e);
  }
  return null;
}

/* 🖼️ ATUALIZAR CAPA */
function atualizarCapa(url, artista){
  const img = document.getElementById("cover");

  const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(artista)}&background=0f0f0f&color=00ffcc`;

  if(!url){
    img.src = fallback;
    return;
  }

  const test = new Image();
  test.onload = ()=>{
    img.style.opacity=0;
    setTimeout(()=>{
      img.src=url;
      img.style.opacity=1;
    },200);
  };
  test.onerror = ()=> img.src=fallback;

  test.src = url + "?t=" + Date.now();
}

/* 🔄 ATUALIZAR PLAYER */
async function atualizar(){
  try{
    const res = await fetch("https://vox.svrdedicado.org/api/g1.BGHPCaFIIwKZX_z9dZSiZKYCoM41zevN6iEQD1qI99s?nocache="+Date.now());
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text,"text/xml");

    let musicaRaw = xml.querySelector("musica_atual")?.textContent || "Ao vivo";

    let artista="Desconhecido";
    let musica=musicaRaw;

    if(musicaRaw.includes("-")){
      let partes = musicaRaw.split("-");
      artista = partes[0].trim();
      musica = partes.slice(1).join("-").trim();
    }

    document.getElementById("artist").textContent="🎤 "+artista;
    document.getElementById("current-music").innerHTML=`<span>${musica}</span>`;

    let capaRadio = xml.querySelector("capa_musica")?.textContent || "";
    let capaFinal = null;

    if(capaRadio && capaRadio.length>10){
      capaFinal = capaRadio;
    } else {
      capaFinal = await buscarCapaItunes(artista,musica);
    }

    atualizarCapa(capaFinal,artista);

  }catch{
    document.getElementById("current-music").innerHTML="<span>Erro na conexão</span>";
  }
}

setInterval(atualizar,10000);
atualizar();
</script>

</body>
</html>
