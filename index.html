<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemonzin - Radio Luna</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Righteous&display=swap" rel="stylesheet">
    
    <script id='sonic_js' data-port='7018' src='https://technoplayerserver.net/cp/widgets.js'></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a1a;
            overflow: hidden;
        }

        .player-container {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid white;
            border-radius: 2em;
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.4);
            padding: 40px;
            width: 400px;
            text-align: center;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .blur-background {
            filter: blur(8px);
            pointer-events: none;
        }

        /* EFEITO VINIL / LOGO ORIGINAL */
        .radio-logo {
            width: 130px;
            height: 130px;
            margin: 20px auto;
            border: 4px solid #C0C0C0;
            border-radius: 50%;
            position: relative;
            background: url('https://xatimg.com/image/Q5xotmj4LryX.png') center/cover;
            animation: vinylSpin 4s linear infinite paused;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            z-index: 5;
        }

        .playing .radio-logo { animation-play-state: running; }

        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* CONTROLES SOBRE O DISCO */
        .player-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            animation: counterRotate 4s linear infinite reverse paused;
        }

        .playing .player-controls { animation-play-state: running; }

        @keyframes counterRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .play-button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CAPA DO ÁLBUM (APPLE) - Posicionada como no anterior */
        #sonic_art {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 80px;
            height: 80px;
            border-radius: 10px;
            background-size: cover;
            border: 1px solid #fff;
            background-color: #222;
            transition: background-image 0.5s;
        }

        /* INFOS WIDGET */
        .listeners-container, .dj-wrapper {
            position: absolute;
            left: 15px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 15px;
            color: #fff;
            font-size: 12px;
        }
        .listeners-container { top: 15px; }
        .dj-wrapper { top: 50px; }

        .neon-letter {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #C0C0C0;
            display: inline-block;
            margin: 10px 0;
        }

        /* AREA DA MÚSICA */
        .now-playing {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            overflow: hidden;
            white-space: nowrap;
        }

        #sonic_title {
            display: inline-block;
            color: #fff;
            font-weight: bold;
            animation: marquee 10s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* VOLUME */
        .volume-control {
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #fff;
        }

        .volume-slider {
            cursor: pointer;
            width: 150px;
            accent-color: #C0C0C0;
        }

        /* HISTÓRICO */
        .history-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            background: #222;
            border: 2px solid #C0C0C0;
            border-radius: 15px;
            padding: 20px;
            z-index: 9999;
            display: none;
            color: #fff;
        }
        .history-container.active { display: block; }
        .close-history { float: right; cursor: pointer; background: none; border: none; color: #fff; font-size: 20px; }

        .datetime-container { font-size: 13px; color: #ccc; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="player-container" id="mainPlayer">
        <div class="listeners-container"><i class="fas fa-headphones"></i> <span id="sonic_listeners">--</span></div>
        <div class="dj-wrapper"><i class="fas fa-headset"></i> <span id="sonic_dj">AutoDj</span></div>
        
        <div id="sonic_art"></div>

        <div class="radio-logo">
            <div class="player-controls">
                <button class="play-button" id="playButton">▶</button>
            </div>
        </div>

        <div class="player-title">
            <span class="neon-letter">RADIO LUNA</span>
        </div>

        <div class="now-playing">
            <div id="sonic_title">Carregando informações...</div>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-down"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="0.7">
            <span id="volumePercentage">70%</span>
        </div>

        <div class="datetime-container">
            <span id="current-time">00:00:00</span> | <span id="current-date">01/01/2025</span>
        </div>

        <button id="historyButton" style="margin-top:15px; cursor:pointer; background:#444; color:#fff; border:none; padding:5px 15px; border-radius:10px;">
            <i class="fas fa-history"></i> Historial
        </button>
    </div>

    <div id="historyContainer" class="history-container">
        <button id="closeHistory" class="close-history">&times;</button>
        <h3>Historial</h3>
        <div id="sonic_history">Buscando...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const audio = new Audio("https://stm.igng.com.br:7018/stream");
            audio.volume = 0.7;
            let isPlaying = false;

            const playBtn = document.getElementById('playButton');
            const playerCont = document.getElementById('mainPlayer');
            const titleElement = document.getElementById('sonic_title');

            // Função de busca da Capa na Apple
            async function getAppleArt(song) {
                if(!song || song.includes("Carregando")) return;
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(song)}&media=music&limit=1`);
                    const data = await res.json();
                    if(data.results.length > 0) {
                        const img = data.results[0].artworkUrl100.replace('100x100bb', '300x300bb');
                        document.getElementById('sonic_art').style.backgroundImage = `url('${img}')`;
                    }
                } catch(e) {}
            }

            // Monitorar mudança de música para atualizar capa e garantir nome visível
            const observer = new MutationObserver(() => {
                const currentTrack = titleElement.innerText.trim();
                if(currentTrack !== "" && !currentTrack.includes("Carregando")) {
                    getAppleArt(currentTrack);
                }
            });
            observer.observe(titleElement, { childList: true, subtree: true });

            // Play/Pause
            playBtn.addEventListener('click', () => {
                if (!isPlaying) {
                    audio.play();
                    playBtn.innerHTML = "⏸";
                    playerCont.classList.add('playing');
                } else {
                    audio.pause();
                    playBtn.innerHTML = "▶";
                    playerCont.classList.remove('playing');
                }
                isPlaying = !isPlaying;
            });

            // Volume
            const vSlider = document.getElementById('volumeSlider');
            vSlider.addEventListener('input', (e) => {
                audio.volume = e.target.value;
                document.getElementById('volumePercentage').innerText = Math.round(e.target.value * 100) + "%";
            });

            // Data e Hora
            setInterval(() => {
                const now = new Date();
                document.getElementById('current-time').innerText = now.toLocaleTimeString();
                document.getElementById('current-date').innerText = now.toLocaleDateString();
            }, 1000);

            // Histórico
            const hBtn = document.getElementById('historyButton');
            const hCont = document.getElementById('historyContainer');
            const hClose = document.getElementById('closeHistory');

            hBtn.addEventListener('click', () => { hCont.classList.add('active'); playerCont.classList.add('blur-background'); });
            hClose.addEventListener('click', () => { hCont.classList.remove('active'); playerCont.classList.remove('blur-background'); });
        });
    </script>
</body>
</html>
