<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM RADIO PLAYER</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --chrome: linear-gradient(145deg, #e6e6e6, #ffffff, #b3b3b3);
            --dark-glass: rgba(10, 10, 15, 0.85);
            --panel-border: rgba(255, 0, 122, 0.5);
        }

        body, html { margin: 0; padding: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .radio-wrapper {
            position: relative;
            width: 637px;
            height: 363px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 2px solid var(--panel-border);
            box-shadow: 0 0 30px rgba(255, 0, 122, 0.2);
            font-family: 'Rajdhani', sans-serif;
        }

        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; filter: brightness(0.4);
        }

        .hud-top {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 10;
        }

        .clock-box {
            background: var(--dark-glass);
            padding: 10px 20px;
            border-left: 4px solid var(--neon-pink);
        }

        .music-info-center {
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 90%;
        }

        #radio_song {
            color: #fff; font-size: 22px; font-weight: 700;
            text-transform: uppercase; display: block;
            text-shadow: 0 2px 10px #000;
            min-height: 30px;
        }

        .hud-bottom {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 90px; background: rgba(0,0,0,0.9);
            border-top: 1px solid var(--panel-border);
            display: flex; align-items: center; padding: 0 25px; gap: 15px; z-index: 10;
        }

        .btn-play-main {
            width: 60px; height: 60px; background: var(--chrome);
            border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .eq-container { display: flex; gap: 3px; height: 20px; align-items: flex-end; }
        .bar { width: 3px; background: var(--neon-blue); height: 3px; }
        .active .bar { animation: barAnim 0.5s infinite alternate; }
        @keyframes barAnim { from {height: 3px;} to {height: 20px;} }

        #radio_status { color: var(--neon-pink); font-weight: bold; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="radio-wrapper">
        <video class="bg-layer" autoplay loop muted playsinline>
            <source src="https://i.imgur.com/Z78pSNa.mp4" type="video/mp4">
        </video>

        <div class="hud-top">
            <div class="clock-box">
                <div id="date-text" style="color: var(--neon-blue); font-size: 11px;">---</div>
                <h2 id="time-text" style="margin:0; color:#fff; font-family:'Orbitron';">00:00</h2>
            </div>
            <div id="radio_status">AUTO DJ / LIVE</div>
        </div>

        <div class="music-info-center">
            <div style="margin-bottom: 15px;">
                <i class="fas fa-compact-disc fa-spin" style="color: var(--neon-pink); font-size: 50px;"></i>
            </div>
            <div id="radio_song">OBTENDO INFORMAÇÕES...</div>
            <div style="color: var(--neon-blue); font-size: 14px; margin-top: 5px; font-weight: 600;">
                <i class="fas fa-broadcast-tower"></i> CONEXÃO SERTANEJA
            </div>
        </div>

        <div class="hud-bottom">
            <button class="btn-play-main" id="play-trigger">
                <i class="fas fa-play" id="play-icon" style="font-size: 20px;"></i>
            </button>

            <div style="flex-grow: 1;">
                <div class="label" style="color: #666; font-size: 10px; margin-bottom: 5px;">AUDIO SPECTRUM</div>
                <div class="eq-container" id="eq">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
            </div>

            <div style="display: flex; align-items: center; gap: 10px; color: var(--neon-blue);">
                <i class="fas fa-volume-up"></i>
                <input type="range" id="vol-control" min="0" max="1" step="0.1" value="0.8">
            </div>
        </div>

        <audio id="radio-player" src="http://stm.igng.com.br:7018/stream" crossorigin="anonymous"></audio>
    </div>

    <script>
        const audio = document.getElementById('radio-player');
        const playBtn = document.getElementById('play-trigger');
        const playIcon = document.getElementById('play-icon');
        const eq = document.getElementById('eq');
        const vol = document.getElementById('vol-control');
        const songDisplay = document.getElementById('radio_song');

        // FUNÇÃO PARA PEGAR MÚSICA DA API
        async function updateSong() {
            try {
                // Usando um proxy para evitar erro de CORS se necessário
                const response = await fetch('http://igng.com.br/api/NzAxOCsx');
                const data = await response.text();
                
                if (data && data.trim() !== "") {
                    songDisplay.innerText = data.toUpperCase();
                }
            } catch (error) {
                console.error("Erro ao carregar API:", error);
            }
        }

        // Atualiza a cada 15 segundos
        setInterval(updateSong, 15000);
        updateSong();

        // Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.className = 'fas fa-pause';
                eq.classList.add('active');
            } else {
                audio.pause();
                playIcon.className = 'fas fa-play';
                eq.classList.remove('active');
            }
        });

        vol.addEventListener('input', (e) => { audio.volume = e.target.value; });

        function updateHUD() {
            const now = new Date();
            document.getElementById('time-text').textContent = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date-text').textContent = now.toLocaleDateString('pt-BR', {weekday: 'short', day: '2-digit', month: '2-digit'}).toUpperCase();
        }
        setInterval(updateHUD, 1000);
        updateHUD();
    </script>
</body>
</html>
