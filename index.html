<audio id="audio"></audio>

<script>
const audio = document.getElementById("audio");

/* 🎧 LISTA DE STREAMS (principal + backup) */
const streams = [
  "http://stm.igng.com.br:7018/stream",
  "http://stm.igng.com.br:7018/;",
  "https://s01.svrdedicado.org:7956/stream"
];

let currentStream = 0;

/* ▶️ PLAY COM AUTO TROCA */
async function playStream(){
  try {
    audio.src = streams[currentStream];
    await audio.play();
    console.log("Tocando:", streams[currentStream]);
  } catch {
    trocarStream();
  }
}

/* 🔄 TROCAR STREAM AUTOMÁTICO */
function trocarStream(){
  currentStream++;
  if(currentStream >= streams.length){
    currentStream = 0;
  }
  console.log("Tentando outro stream...");
  playStream();
}

/* BOTÃO PLAY */
playBtn.onclick = async () => {
  if(audio.paused){
    await playStream();
    playBtn.textContent="⏸️";
    player.classList.add("playing");
  } else {
    audio.pause();
    playBtn.textContent="▶️";
    player.classList.remove("playing");
  }
};

/* 🚨 SE CAIR, TROCA AUTOMATICAMENTE */
audio.onerror = trocarStream;
audio.onstalled = trocarStream;
audio.onabort = trocarStream;
</script>
